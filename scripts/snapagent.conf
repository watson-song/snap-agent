server {
    listen 80;
    server_name snapagent.sit.sf-express.com;

    location /snapagent/ {
        alias /home/appdeploy/snapagent/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        location ~ \.zip$ {
            add_header Content-Disposition "attachment";
            add_header Content-Type "application/zip";
        }
    }
}
