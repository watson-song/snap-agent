# ============================================================
# SnapAgent — SF 默认配置
# 将以下内容合并到宿主项目的 application.yml 中
# ============================================================

snap-agent:
  # 总开关 — true 才会装配 Agent bean
  enabled: true
  # Web 端点前缀，所有 API 挂在 /snap-agent/** 下
  base-path: /snap-agent

  # ---- 两层 Skill 目录 ----
  # 内置 Skill（classpath，只读，打包在 JAR 里）
  builtin-skills-dir: classpath:/docs/skills/
  # 上传 Skill（文件系统，读写，重启后持久化）
  # SF 服务器部署路径
  upload-skills-dir: /app/deploy/skills

  # ---- LLM 配置（cc-switch 代理网关 或 LLM Model Hub）----
  llm:
    # API 类型: anthropic（cc-switch 网关，默认）或 openai（LLM Model Hub 等 OpenAI 兼容接口）
    api-type: anthropic
    # cc-switch 代理地址（api-type=anthropic 时使用）
    base-url: https://claudecode.sf-express.com/ccr
    # Bearer token（cc-switch 的 ANTHROPIC_AUTH_TOKEN，即使用者工号）
    # 部署前必须替换为实际工号，不要使用默认值
    auth-token: "<替换为使用者工号>"
    # 默认模型（cc-switch 配置的 aliyun/glm-5.2）
    model: aliyun/glm-5.2
    # 服务端强制白名单 — 只允许以下模型
    allowed-models:
      - aliyun/glm-5.2
    # 流式输出
    streaming: true
    # 单次请求最大 token
    max-tokens: 8192
    # 超时秒数
    timeout-seconds: 120
    # HTTP 代理（K8s Pod 无法直连外网时配置）
    # 留空则直连；如需代理则填 http://proxy-host:port
    proxy-url: ""

  # ---- JDBC 只读数据源 ----
  jdbc:
    enabled: true
    # 宿主项目需提供名为 snapAgentReadOnlyDataSource 的只读 DataSource Bean
    datasource-bean-name: snapAgentReadOnlyDataSource

  # ---- Redis 只读 ----
  redis:
    enabled: true
    # 宿主项目需提供名为 redisTemplate 的 RedisTemplate Bean
    redis-template-bean-name: redisTemplate

  # ---- 日志分析（只读）----
  logs:
    enabled: true
    # 允许读取的日志目录白名单（LLM 只能读这些目录下的文件）
    # 部署时替换为实际日志路径，如 /app/logs 或 logging.file.name 的父目录
    allowed-paths:
      - /app/logs
    # 单次返回最大行数
    max-lines: 500
    # 单个文件最大字节数（超过则拒绝读取，防止 OOM）
    max-file-bytes: 10485760  # 10 MB

  # ---- Agent 执行参数 ----
  agent:
    max-turns: 20
    task-timeout-minutes: 30
    max-concurrent-runs-per-user: 1
    max-runs-per-hour: 20
    max-result-rows: 1000

  # ---- 安全 ----
  security:
    # auto = 自动探测 Spring Security / Shiro / 无框架
    framework: auto
    # 安全审计日志（记录 API 访问行为）
    audit-log: true
    # SnapAgent 访问权限标识 — 用户必须拥有此权限才能访问 SnapAgent
    # Spring Security: 用户的 GrantedAuthority 需包含 snap-agent:access
    # Shiro: 用户需被分配 snap-agent:access 权限
    required-permission: snap-agent:access
    # ---- 前后端分离 Token 鉴权（宿主用 token 而非 session 鉴权时配置）----
    # 留空则前端依赖浏览器自动携带 cookie（适用于 session 鉴权项目）
    # 配置后前端从 localStorage（优先）或 cookie 读 token，以指定 header 名发送
    # AI 集成时须询问用户：宿主前端 token 存在哪里（localStorage 还是 cookie）？
    #   localStorage → 填 auth-token-local-storage-key（如 TOKEN）
    #   cookie → 填 auth-token-cookie（如 a_authorization）
    #   header 名 → 填 auth-token-header（如 token / Authorization）
    auth-token-header: ""            # 宿主 API 期望的 token header 名称，如 token
    auth-token-local-storage-key: "" # 宿主前端 localStorage 的 token key，如 TOKEN
    auth-token-cookie: ""            # 宿主前端 cookie 的 token 名称，如 a_authorization

  # ---- 多实例路由（单机设 none）----
  routing:
    mode: none
