server:
  port: 8080

snap-agent:
  enabled: true
  base-path: /snap-agent
  builtin-skills-dir: classpath:/docs/skills/
  upload-skills-dir: /tmp/snap-agent-skills
  llm:
    api-key: dummy-key-for-e2e
    model: claude-sonnet-4-6
    timeout-seconds: 10
  agent:
    max-turns: 20
    task-timeout-minutes: 10
  jdbc:
    enabled: true
  routing:
    mode: static
    internal-token: e2e-internal-secret
    internal-path: /snap-agent-internal
    static-peers:
      - http://127.0.0.1:8080
  security:
    required-permission: ""

logging:
  level:
    cn.watsontech.snapagent: INFO
