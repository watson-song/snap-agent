<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="metaDescription"
          data-zh="SnapAgent 技术文档 · 10 篇中英双语深度文档，涵盖架构、集成、搜索、部署、插件、工作流、问题闭环、监控、用户手册。"
          data-en="SnapAgent technical docs · 10 in-depth bilingual documents covering architecture, integration, search, deployment, plugins, workflows, issue closure, monitoring, and user manual."
          content="SnapAgent 技术文档 · 10 篇中英双语深度文档，涵盖架构、集成、搜索、部署、插件、工作流、问题闭环、监控、用户手册。">
    <title id="pageTitle" data-zh="SnapAgent · 技术文档" data-en="SnapAgent · Technical Docs">SnapAgent · 技术文档</title>
    <link rel="canonical" href="https://watson-song.github.io/snap-agent/docs.html">
    <style>
        /* ===== CSS Variables (matches index.html) ===== */
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --bg-card: #1e2a4a;
            --bg-input: #0d1b2a;
            --bg-hover: #264080;
            --text-primary: #e8e8f0;
            --text-secondary: #8892b0;
            --text-muted: #4a5568;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.15);
            --green: #22c55e;
            --green-light: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --red-light: rgba(239, 68, 68, 0.15);
            --orange: #f59e0b;
            --orange-light: rgba(245, 158, 11, 0.15);
            --purple: #8b5cf6;
            --purple-light: rgba(139, 92, 246, 0.15);
            --cyan: #06b6d4;
            --cyan-light: rgba(6, 182, 212, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
            --mono: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--accent-hover); }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

        /* ===== Top Nav (matches index.html) ===== */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .nav-logo .logo-icon { font-size: 22px; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-link {
            color: var(--text-secondary); font-size: 14px;
            padding: 6px 12px; border-radius: var(--radius-sm);
            transition: color 0.2s, background 0.2s;
        }
        .nav-link:hover { color: var(--text-primary); background: var(--accent-light); }
        .nav-lang-toggle {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 6px 14px; border-radius: 999px;
            font-size: 13px; cursor: pointer; font-family: var(--font);
            transition: all 0.2s;
        }
        .nav-lang-toggle:hover { border-color: var(--accent); color: var(--text-primary); }

        /* ===== Docs Layout ===== */
        .docs-layout {
            display: flex; gap: 0;
            min-height: calc(100vh - 64px);
        }
        .docs-sidebar {
            width: 280px; flex-shrink: 0;
            padding: 32px 16px 32px 24px;
            border-right: 1px solid var(--border);
            position: sticky; top: 64px;
            align-self: flex-start;
            max-height: calc(100vh - 64px);
            overflow-y: auto;
        }
        .sidebar-heading {
            font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-muted); margin-bottom: 16px; padding: 0 8px;
        }
        .sidebar-list { list-style: none; }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: var(--radius-sm);
            color: var(--text-secondary); font-size: 14px;
            transition: all 0.2s; cursor: pointer;
            margin-bottom: 2px; border: 1px solid transparent;
        }
        .sidebar-item:hover { background: var(--bg-card); color: var(--text-primary); }
        .sidebar-item.active {
            background: var(--accent-light); color: var(--accent);
            border-color: rgba(59, 130, 246, 0.25);
        }
        .sidebar-item .icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
        .sidebar-item .label { flex: 1; }
        .sidebar-item .meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
        .sidebar-item.active .meta { color: var(--accent); opacity: 0.7; }

        .docs-content {
            flex: 1; min-width: 0;
            padding: 40px 48px 80px;
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center; padding: 120px 24px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }

        /* ===== Loading / Error ===== */
        .loading, .error {
            text-align: center; padding: 80px 24px;
            color: var(--text-muted); font-size: 15px;
        }
        .loading::before {
            content: ""; display: inline-block;
            width: 20px; height: 20px; margin-right: 10px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; vertical-align: middle;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: var(--red); }

        /* ===== Prose (rendered markdown) ===== */
        .prose { max-width: 820px; line-height: 1.7; font-size: 15px; color: var(--text-secondary); }
        .prose h1 {
            font-size: 28px; font-weight: 700; color: var(--text-primary);
            margin: 0 0 24px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .prose h2 {
            font-size: 22px; font-weight: 600; color: var(--text-primary);
            margin: 40px 0 16px; padding-top: 8px;
        }
        .prose h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin: 28px 0 12px; }
        .prose h4 { font-size: 16px; font-weight: 600; color: var(--text-primary); margin: 24px 0 8px; }
        .prose p { margin: 12px 0; }
        .prose ul, .prose ol { margin: 12px 0 12px 24px; }
        .prose li { margin: 4px 0; }
        .prose a { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(59, 130, 246, 0.3); text-underline-offset: 2px; }
        .prose a:hover { color: var(--accent-hover); text-decoration-color: var(--accent); }
        .prose blockquote {
            border-left: 3px solid var(--accent);
            padding: 8px 16px; margin: 16px 0;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .prose blockquote p { margin: 4px 0; }
        .prose code {
            font-family: var(--mono); font-size: 13px;
            background: var(--bg-tertiary); padding: 2px 6px;
            border-radius: 4px; color: var(--accent);
        }
        .prose pre {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px 20px;
            overflow-x: auto; margin: 16px 0;
            font-size: 13px; line-height: 1.5;
        }
        .prose pre code {
            background: none; padding: 0; color: var(--text-primary);
            font-size: 13px; line-height: 1.5;
        }
        .prose table {
            border-collapse: collapse; width: 100%;
            margin: 16px 0; font-size: 14px;
            display: block; overflow-x: auto;
        }
        .prose th, .prose td {
            border: 1px solid var(--border); padding: 8px 12px; text-align: left;
        }
        .prose th { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 600; }
        .prose tr:nth-child(even) td { background: rgba(255, 255, 255, 0.02); }
        .prose hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
        .prose img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
        .prose strong { color: var(--text-primary); font-weight: 600; }
        .prose em { color: var(--text-primary); font-style: italic; }

        /* Doc footer (edit link) */
        .doc-footer {
            margin-top: 48px; padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 13px; color: var(--text-muted);
        }
        .doc-footer a { color: var(--text-secondary); }
        .doc-footer a:hover { color: var(--accent); }

        /* ===== Footer ===== */
        .footer {
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            padding: 32px 0;
        }
        .footer-inner {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 24px;
        }
        .footer-brand { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; }
        .footer-brand .logo-icon { font-size: 20px; }
        .footer-meta { font-size: 13px; color: var(--text-muted); }
        .footer-meta a { color: var(--text-secondary); }
        .footer-meta a:hover { color: var(--text-primary); }

        /* ===== Bilingual =====
           Note: <body> must NOT carry data-lang — the general [data-lang="en"]
           rule would otherwise turn body into display:none/inline and collapse
           the dark background, leaving a white viewport. Only <html> carries
           data-lang; body's own attribute is never touched. */
        [data-lang="en"] { display: none; }
        html[data-lang="en"] [data-lang="en"] { display: block; }
        html[data-lang="en"] [data-lang="zh"] { display: none; }
        html[data-lang="zh"] [data-lang="zh"] { display: block; }
        html[data-lang="zh"] [data-lang="en"] { display: none; }
        /* Inline contexts: spans inside paragraphs, loading dots, footer labels */
        .lang-inline[data-lang="zh"], .lang-inline[data-lang="en"] { display: inline !important; }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .docs-sidebar { width: 240px; }
            .docs-content { padding: 32px 32px 64px; }
        }
        @media (max-width: 768px) {
            .docs-layout { flex-direction: column; }
            .docs-sidebar {
                width: 100%; position: relative; top: 0;
                max-height: none; border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 16px 16px 8px;
            }
            .sidebar-heading { margin-bottom: 8px; }
            .sidebar-list {
                display: flex; flex-wrap: wrap; gap: 6px;
            }
            .sidebar-item {
                font-size: 13px; padding: 6px 10px;
                margin-bottom: 0; flex: 0 0 auto;
            }
            .sidebar-item .meta { display: none; }
            .docs-content { padding: 24px 16px 48px; }
            .prose { font-size: 14px; }
            .prose h1 { font-size: 24px; }
            .prose h2 { font-size: 20px; }
            .prose h3 { font-size: 17px; }
        }
    </style>
</head>
<body><!-- body intentionally has no data-lang attr; see bilingual CSS note -->

<!-- ===== Top Nav ===== -->
<nav class="nav">
    <div class="container nav-inner">
        <a href="index.html" class="nav-logo">
            <span class="logo-icon">⚡</span>
            <span>SnapAgent</span>
        </a>
        <div class="nav-right">
            <a href="index.html#features" class="nav-link">
                <span class="lang-inline" data-lang="zh">特性</span><span class="lang-inline" data-lang="en">Features</span>
            </a>
            <a href="index.html#quickstart" class="nav-link">
                <span class="lang-inline" data-lang="zh">快速开始</span><span class="lang-inline" data-lang="en">Quick Start</span>
            </a>
            <a href="docs.html" class="nav-link" style="color: var(--accent);">
                <span class="lang-inline" data-lang="zh">文档</span><span class="lang-inline" data-lang="en">Docs</span>
            </a>
            <button class="nav-lang-toggle" id="langToggle">中文 / EN</button>
            <a href="index.html#quickstart" class="nav-link" style="background: var(--accent); color: #fff; padding: 8px 18px; border-radius: var(--radius-sm); font-weight: 500;">
                <span class="lang-inline" data-lang="zh">开始使用</span><span class="lang-inline" data-lang="en">Get Started</span>
            </a>
        </div>
    </div>
</nav>

<!-- ===== Docs Layout ===== -->
<div class="docs-layout">
    <aside class="docs-sidebar">
        <div class="sidebar-heading">
            <span class="lang-inline" data-lang="zh">文档目录</span><span class="lang-inline" data-lang="en">Contents</span>
        </div>
        <ul class="sidebar-list" id="sidebarList">
            <!-- Populated by JS -->
        </ul>
    </aside>

    <main class="docs-content">
        <div id="docRender" class="prose">
            <div class="empty-state">
                <div class="icon">📚</div>
                <h3>
                    <span class="lang-inline" data-lang="zh">选择左侧目录开始阅读</span>
                    <span class="lang-inline" data-lang="en">Select a doc from the left to start reading</span>
                </h3>
            </div>
        </div>
    </main>
</div>

<!-- ===== Footer ===== -->
<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-brand">
            <span class="logo-icon">⚡</span>
            <span>SnapAgent v0.4</span>
            <span style="margin-left: 16px;" class="lang-inline" data-lang="zh">嵌入式 AI 技能框架</span>
            <span style="margin-left: 16px;" class="lang-inline" data-lang="en">Embeddable AI Skill Framework</span>
        </div>
        <div class="footer-meta">
            <span class="lang-inline" data-lang="zh">文档基于 v0.4 · </span>
            <span class="lang-inline" data-lang="en">Documented against v0.4 · </span>
            <a href="index.html">
                <span class="lang-inline" data-lang="zh">返回主页</span>
                <span class="lang-inline" data-lang="en">Back to Home</span>
            </a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
(function () {
    'use strict';

    // ===== Doc registry =====
    const DOCS = [
        { slug: 'system-architecture', icon: '🏛️',
          zh: { title: '系统架构总览', path: './architecture/zh/system-architecture.md' },
          en: { title: 'System Architecture', path: './architecture/en/system-architecture.md' } },
        { slug: 'anchor-feature-guide', icon: '💬',
          zh: { title: '锚点问答接入指南', path: './integration/zh/anchor-feature-guide.md' },
          en: { title: 'Anchor Q&A Integration Guide', path: './integration/en/anchor-feature-guide.md' } },
        { slug: 'knowledge-search', icon: '🔍',
          zh: { title: '知识搜索算法', path: './search/zh/knowledge-search.md' },
          en: { title: 'Knowledge Search Algorithm', path: './search/en/knowledge-search.md' } },
        { slug: 'host-integration-guide', icon: '🔌',
          zh: { title: '宿主集成指南', path: './integration/zh/host-integration-guide.md' },
          en: { title: 'Host Integration Guide', path: './integration/en/host-integration-guide.md' } },
        { slug: 'multi-cluster-architecture', icon: '🌐',
          zh: { title: '多集群部署架构', path: './deployment/zh/multi-cluster-architecture.md' },
          en: { title: 'Multi-Cluster Deployment', path: './deployment/en/multi-cluster-architecture.md' } },
        { slug: 'tool-plugin-architecture', icon: '🔧',
          zh: { title: '工具插件架构', path: './plugins/zh/tool-plugin-architecture.md' },
          en: { title: 'Tool Plugin Architecture', path: './plugins/en/tool-plugin-architecture.md' } },
        { slug: 'workflow-engine-architecture', icon: '📋',
          zh: { title: '工作流引擎架构', path: './workflow/zh/workflow-engine-architecture.md' },
          en: { title: 'Workflow Engine Architecture', path: './workflow/en/workflow-engine-architecture.md' } },
        { slug: 'issue-closure-architecture', icon: '🐛',
          zh: { title: '问题闭环架构', path: './issue/zh/issue-closure-architecture.md' },
          en: { title: 'Issue Closure Architecture', path: './issue/en/issue-closure-architecture.md' } },
        { slug: 'proactive-monitoring-architecture', icon: '🛡️',
          zh: { title: '主动监控架构', path: './proactive/zh/proactive-monitoring-architecture.md' },
          en: { title: 'Proactive Monitoring Architecture', path: './proactive/en/proactive-monitoring-architecture.md' } },
        { slug: 'user-manual', icon: '📖',
          zh: { title: '用户手册', path: './manual/zh/user-manual.md' },
          en: { title: 'User Manual', path: './manual/en/user-manual.md' } }
    ];

    // ===== State =====
    let currentLang = 'zh';
    let currentSlug = null;

    // ===== DOM refs =====
    const sidebarList = document.getElementById('sidebarList');
    const docRender = document.getElementById('docRender');
    const langToggle = document.getElementById('langToggle');
    const htmlEl = document.documentElement;
    const pageTitle = document.getElementById('pageTitle');
    const metaDescription = document.getElementById('metaDescription');

    // ===== Render sidebar =====
    function renderSidebar() {
        sidebarList.innerHTML = '';
        DOCS.forEach(doc => {
            const li = document.createElement('li');
            li.className = 'sidebar-item';
            li.dataset.slug = doc.slug;
            li.innerHTML =
                '<span class="icon">' + doc.icon + '</span>' +
                '<span class="label">' +
                  '<span class="lang-inline" data-lang="zh">' + escapeHtml(doc.zh.title) + '</span>' +
                  '<span class="lang-inline" data-lang="en">' + escapeHtml(doc.en.title) + '</span>' +
                '</span>';
            li.addEventListener('click', () => {
                location.hash = doc.slug;
            });
            sidebarList.appendChild(li);
        });
    }

    // ===== Load + render a doc =====
    async function loadDoc(slug) {
        const doc = DOCS.find(d => d.slug === slug);
        if (!doc) {
            renderError('Doc not found: ' + slug);
            return;
        }
        currentSlug = slug;
        const meta = doc[currentLang];

        // Highlight active sidebar item
        document.querySelectorAll('.sidebar-item').forEach(el => {
            el.classList.toggle('active', el.dataset.slug === slug);
        });

        // Loading state
        docRender.className = 'prose';
        docRender.innerHTML = '<div class="loading">' +
            '<span class="lang-inline" data-lang="zh">加载中</span>' +
            '<span class="lang-inline" data-lang="en">Loading</span>…</div>';
        applyLangDisplay(currentLang);

        try {
            const res = await fetch(meta.path, { cache: 'no-cache' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const md = await res.text();

            let html;
            if (typeof marked !== 'undefined' && marked.parse) {
                html = marked.parse(md, { breaks: false, gfm: true });
            } else if (typeof marked !== 'undefined' && typeof marked === 'function') {
                html = marked(md);
            } else {
                // Fallback: raw markdown in <pre>
                html = '<pre><code>' + escapeHtml(md) + '</code></pre>';
            }
            docRender.innerHTML = html;

            // Edit-on-GitHub footer
            const ghBase = 'https://github.com/watson-song/snap-agent/edit/main/docs/site/';
            const relPath = meta.path.replace('./', '');
            const editLink = ghBase + relPath;
            const footer = document.createElement('div');
            footer.className = 'doc-footer';
            footer.innerHTML =
                '<span class="lang-inline" data-lang="zh">在 GitHub 上编辑此文档 · </span>' +
                '<span class="lang-inline" data-lang="en">Edit this doc on GitHub · </span>' +
                '<a href="' + editLink + '" target="_blank" rel="noopener">' + escapeHtml(relPath) + ' ↗</a>';
            docRender.appendChild(footer);
            applyLangDisplay(currentLang);

            // Document title
            pageTitle.textContent = meta.title + ' · SnapAgent';
            metaDescription.setAttribute('content', meta.title + ' · SnapAgent 技术文档');

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
            renderError(err.message);
        }
    }

    function renderError(msg) {
        docRender.className = 'prose';
        docRender.innerHTML = '<div class="error">' +
            '<p>⚠️ <span class="lang-inline" data-lang="zh">加载失败</span><span class="lang-inline" data-lang="en">Failed to load</span></p>' +
            '<p style="font-size: 13px; margin-top: 8px; color: var(--text-muted);">' + escapeHtml(msg) + '</p>' +
            '<p style="margin-top: 16px;"><a href="javascript:location.reload()">↻ <span class="lang-inline" data-lang="zh">重试</span><span class="lang-inline" data-lang="en">Retry</span></a></p>' +
            '</div>';
        applyLangDisplay(currentLang);
    }

    // ===== Bilingual toggle =====
    function applyLang(lang) {
        currentLang = lang;
        htmlEl.setAttribute('data-lang', lang);
        htmlEl.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
        // NOTE: do NOT set data-lang on <body> — the [data-lang="en"] CSS rule
        // would turn body into display:none/inline and collapse the background.
        langToggle.textContent = lang === 'zh' ? '中文 / EN' : 'EN / 中文';
        langToggle.setAttribute('aria-label', lang === 'zh' ? 'Switch to English' : '切换到中文');
        langToggle.setAttribute('lang', lang === 'zh' ? 'en' : 'zh');
        // Re-render current doc in new language
        if (currentSlug) loadDoc(currentSlug);
    }
    function applyLangDisplay(lang) {
        htmlEl.setAttribute('data-lang', lang);
        htmlEl.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
    }

    langToggle.addEventListener('click', () => {
        const next = currentLang === 'zh' ? 'en' : 'zh';
        applyLang(next);
        try { localStorage.setItem('snapagent-lang', next); } catch (e) {}
    });

    // ===== Hash routing =====
    function routeFromHash() {
        const slug = location.hash.replace(/^#/, '');
        if (slug && DOCS.find(d => d.slug === slug)) {
            loadDoc(slug);
        } else {
            // Default to first doc
            if (!location.hash) {
                history.replaceState(null, '', '#system-architecture');
                loadDoc('system-architecture');
            } else {
                loadDoc('system-architecture');
            }
        }
    }
    window.addEventListener('hashchange', routeFromHash);

    // ===== Utilities =====
    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ===== Init =====
    renderSidebar();

    // Restore language preference
    try {
        const saved = localStorage.getItem('snapagent-lang');
        if (saved === 'en') {
            applyLang('en');
        }
    } catch (e) {}

    // Initial route
    routeFromHash();
})();
</script>

</body>
</html>
